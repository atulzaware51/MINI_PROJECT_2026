<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulnerabilty Scaner auth</title>
     <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
 <body class="bg-light"> <!--bg clr is light -->
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <!-- vh-100 makes container take full scrreen  -->
         <div class="card shadow p-4" style="width :350px;">
            <!-- p-4 adds to the padding -->
              <h3 class="text-center mb-3" id="form-tittle">Sign In</h3>  <!--dnyamic tittle chages based on form -->
                
              <form id=" authoForm">

                    <div class="mb-3 d-none" id="nameField">
                        <!-- d hides  initlall  -->
                         <label class="form-label"> Full name</label>
                         <input type="text" class="form-control" placeholder="Enter you name">
                         <!-- input field  -->
                    </div>
                    <!-- emiald file s -->
                     <div class="mb-3">
                        <label class="form-label">email</label>
                        <input type="email" class="form-control" placeholder="Enter email"required>
                        <!-- email input -->
                     </div>
                     <!-- passoward -->
                      <div class="mb-3">
                        <label class="form-label"> password</label>
                        <input type="password" class="form-control" placeholder="Enter password" required>
                      </div>
                      <!-- confirm password for the sign up only -->
                       <div class="mb-3 d none" id="confirmPassowordField">
                        <!-- hidden initally -->
                         <label class="form-label"> confirm password</label>
                         <input type="password" class="form-control" placeholder="Confirm password">
                       </div>

                       <!-- submit button -->
                        <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                            Sign in
                            <!-- w-100 amkes the button full width -->
                        </button>
                        <!-- togglelink -->
                         <p class="text-center mt-3">
                            <span id = "toggleText"> Don't have the account</span>
                            <a href="#" id="toggleLink"> Sign up </a>
                         </p>
                </form>
            </div>
    </div>
    <!-- bootstrap js bundle -->
    <script src="https://cdn.jsdeliver.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"> </script>
    <script>
        //select elements form 
        const toggleLink = document.getElementById("toggleLink");//switch to form
        const formTitle = document.getElementById("form-title");//title text
        const submitBtn = document.getElementById("submitBtn");// buton text
        const toggleText = document.getElementById("toggleText")//helper text

        const nameField = document.getElementById("nameField")//namefield
        const confirmPasswordField = document.getElementById("confirmPasswordField")//confirm passoward
        let isSignUp = false;//state variable
        toggleLink.addEventListener("click",function(e){
            e.preventDefault();//prevent page reload
            isSignUp = !isSignUp // switch state
            if( isSignUp){
                formTitle.innerText = "Sign Up"//chang tittle
                submitBtn.innerText = "Sign Up"// change button text
                toggleText.innerText="Already have an account?";//update text
                toggleLink.innerText="Sign In"// Link text
                nameField.classList.remove("d-none");//show name field
                confirmPasswordField.classList.remove("d-none");//show confirm
            }
            else{
                formTitle.innerText = "Sign In"// change back title
                submitBtn.innerText = "Sign In" // button text
                toggleText.innerText= "Don't have account?"//tex
                toggleLink.innerText= "sing up"//link text
                nameField.classList.add("d-none");//hides namefiles
                confirmPasswordField.classList.add("d-none");
            }
        });
    </script>
</body>
</html>
